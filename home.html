<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PC Sales Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <div class="header">
            <h1>¡Bienvenido a la Tienda!</h1>
            <p>Has iniciado sesión correctamente. Aquí podrás ver los mejores componentes para tu PC.</p>
        </div>
        
        <div class="card" style="background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 16px; margin-top: 2rem; border: 1px solid rgba(255,255,255,0.1);">
            <h2 style="color: var(--primary); margin-bottom: 1rem;">Próximamente</h2>
            <p style="text-align: left; margin-bottom: 0;">Estamos preparando el catálogo de productos para tu TP de la universidad. ¡Vuelve pronto!</p>
        </div>

        <a href="/logout" class="btn-primary" style="display: inline-block; text-decoration: none; text-align: center; margin-top: 2rem;">Cerrar Sesión</a>
    </div>
</body>
</html>
