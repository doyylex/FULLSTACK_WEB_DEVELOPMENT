<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administrador - PC Sales</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .admin-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; width: 100%; max-width: 1200px; padding: 2rem 0; }
        .product-list { background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .product-item { background: rgba(0,0,0,0.2); padding: 1.2rem; border-radius: 12px; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.05); }
        .product-edit-fields { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; align-items: center; }
        .product-edit-fields input { width: auto; padding: 0.5rem; font-size: 0.85rem; margin-bottom: 0; }
        .btn-sm { padding: 0.5rem 0.8rem; font-size: 0.8rem; width: auto; margin: 0; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1200px; display: block; height: auto; min-height: 100vh; padding: 4rem 2rem;">
        <h1 style="text-align: left; margin-bottom: 2rem;">Panel de Administración Avanzado</h1>
        
        <div class="admin-grid">
            <!-- Formulario de Creación con Stock -->
            <div class="auth-form" style="padding: 2rem; max-width: none;">
                <h2 style="margin-bottom: 1.5rem; color: var(--primary);">NUEVO PRODUCTO</h2>
                <form action="/admin/productos" method="POST">
                    <div class="input-group">
                        <label>Nombre</label>
                        <input type="text" name="nombre" required placeholder="Producto...">
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <div class="input-group" style="flex: 1;">
                            <label>Precio ($)</label>
                            <input type="number" step="0.01" name="precio" required placeholder="0.00">
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label>Stock Inicial</label>
                            <input type="number" name="stock" required placeholder="10">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Categoría</label>
                        <select name="categoria" required style="width: 100%; background: #0f172a; padding: 0.8rem; border-radius: 12px; color: white;">
                             <option value="Procesadores">Procesadores</option>
                             <option value="Placas de Video">Placas de Video</option>
                             <option value="Memorias RAM">Memorias RAM</option>
                             <option value="Almacenamiento">Almacenamiento</option>
                             <option value="Periféricos">Periféricos</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Descripción</label>
                        <input type="text" name="descripcion" placeholder="Detalle...">
                    </div>
                    <button type="submit" class="btn-primary">Registrar en Inventario</button>
                </form>
            </div>

            <!-- Gestión de Inventario Existente -->
            <div class="product-list">
                <h2 style="margin-bottom: 1.5rem;">Gestión de Stock y Precios</h2>
                <div id="lista-gestion">
                    <p>Cargando inventario...</p>
                </div>
            </div>
        </div>

        <div style="margin-top: 2rem;">
            <a href="/tienda" class="footer-text" style="color: var(--primary);">Volver a Tienda</a> | 
            <a href="/logout" style="color: #ef4444; text-decoration: none; font-size: 0.85rem;">Cerrar Sesión</a>
        </div>
    </div>

    <script>
        async function cargarGestion() {
            const resp = await fetch('/api/productos');
            const productos = await resp.json();
            const div = document.getElementById('lista-gestion');
            div.innerHTML = '';
            
            productos.forEach(prod => {
                div.innerHTML += `
                    <div class="product-item">
                        <div style="display: flex; justify-content: space-between;">
                            <strong>${prod.nombre}</strong>
                            <small style="color: #64748b;">[${prod.categoria}]</small>
                        </div>
                        <div class="product-edit-fields">
                            <div>
                                <label style="font-size: 0.7rem;">Nombre:</label>
                                <input type="text" value="${prod.nombre}" id="name-${prod.id}">
                            </div>
                            <div>
                                <label style="font-size: 0.7rem;">Precio ($):</label>
                                <input type="number" step="0.01" value="${prod.precio}" id="price-${prod.id}" style="width: 80px;">
                            </div>
                            <div>
                                <label style="font-size: 0.7rem;">Stock:</label>
                                <input type="number" value="${prod.stock}" id="stock-${prod.id}" style="width: 70px;">
                            </div>
                            <button onclick="guardarCambios(${prod.id})" class="btn-primary btn-sm">Guardar</button>
                            <form action="/admin/productos/eliminar" method="POST" style="margin:0;">
                                <input type="hidden" name="id" value="${prod.id}">
                                <button type="submit" class="btn-primary btn-sm" style="background:#ef4444;">×</button>
                            </form>
                        </div>
                    </div>
                `;
            });
        }

        async function guardarCambios(id) {
            const nombre = document.getElementById(`name-${id}`).value;
            const precio = document.getElementById(`price-${id}`).value;
            const stock = document.getElementById(`stock-${id}`).value;

            const resp = await fetch('/admin/productos/editar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, nombre, precio, stock })
            });

            if (resp.ok) {
                alert('Cambios guardados correctamente');
                cargarGestion();
            }
        }

        cargarGestion();
    </script>
</body>
</html>
